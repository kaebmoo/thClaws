name: cargo-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'  # Mondays 05:00 UTC

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-bin-v0.21

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit >/dev/null; then
            cargo install --locked cargo-audit
          fi

      - name: Run cargo audit
        # RUSTSEC-2026-0187 (lopdf 0.31 stack overflow) ignored temporarily.
        # Real fix needs printpdf 0.7→0.9 + lopdf 0.42 (major API port):
        # JimmySoftware/agentic-workspace#1. Drop --ignore when that lands.
        # RUSTSEC-2026-0194 / -0195 (quick-xml DoS: quadratic duplicate-attr
        # scan + unbounded namespace-decl allocation) — transitive via the
        # office-doc (docx/xlsx/pptx) parsers; low-severity DoS on
        # user-supplied files. Drop when those deps allow a patched quick-xml.
        run: cargo audit --ignore RUSTSEC-2026-0187 --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
